name: 仓库保活

on:
  schedule:
    # 每月 1 号 UTC 00:00 自动运行一次
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    # 允许写入仓库内容
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          # 使用仓库默认分支
          ref: ${{ github.event.repository.default_branch }}

      - name: 空提交重置不活跃计时
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep-alive — 重置仓库不活跃计时 ($(date -u +'%Y-%m'))"
          git push
